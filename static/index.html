<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>serial2ws</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a1a;
      color: #d4d4d4;
      padding: 2rem;
      min-height: 100vh;
    }

    h1 { font-size: 1.3rem; font-weight: 600; color: #fff; margin-bottom: 1.5rem; }

    /* ── rows ────────────────────────────────────────────────────────────── */
    .row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.6rem;
      flex-wrap: wrap;
    }

    label { font-size: 0.8rem; color: #777; width: 4rem; flex-shrink: 0; }

    input[type="text"] {
      padding: 0.42rem 0.7rem;
      border: 1px solid #3a3a3a;
      border-radius: 5px;
      background: #252525;
      color: #d4d4d4;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.15s;
      width: 180px;
    }
    input[type="text"]:focus { border-color: #555; }
    input[type="text"]:disabled { opacity: 0.4; }

    button {
      padding: 0.42rem 0.9rem;
      border: none;
      border-radius: 5px;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:disabled { opacity: 0.35; cursor: default; }

    .btn-create  { background: #1a7a45; color: #fff; }
    .btn-create:hover:not(:disabled)  { background: #158038; }

    .btn-close   { background: #922;    color: #fff; }
    .btn-close:hover:not(:disabled)   { background: #b33; }

    .btn-monitor { background: #1e4e8c; color: #fff; }
    .btn-monitor:hover:not(:disabled) { background: #1a4278; }

    .btn-send    { background: #1e4e8c; color: #fff; }
    .btn-send:hover:not(:disabled)    { background: #1a4278; }

    /* ── port paths ──────────────────────────────────────────────────────── */
    .path-badge {
      font-family: "Menlo", "Monaco", "Consolas", monospace;
      font-size: 0.82rem;
      color: #4caf50;
      background: #172517;
      border: 1px solid #284428;
      border-radius: 4px;
      padding: 0.22rem 0.55rem;
      cursor: pointer;
      user-select: all;
      transition: background 0.12s;
    }
    .path-badge:hover { background: #1e341e; }
    .copy-hint { font-size: 0.7rem; color: #555; }

    /* ── status ──────────────────────────────────────────────────────────── */
    .status-row {
      display: flex;
      gap: 1.5rem;
      margin: 0.5rem 0 1rem;
      font-size: 0.76rem;
    }
    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; background: #444; }
    .dot.on  { background: #4caf50; }
    .dot.err { background: #e05555; }
    .status-text { color: #888; }
    .status-text.err { color: #e05555; }

    /* ── terminal ────────────────────────────────────────────────────────── */
    #terminal {
      background: #0d0d0d;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 0.7rem 1rem;
      font-family: "Menlo", "Monaco", "Consolas", monospace;
      font-size: 0.82rem;
      line-height: 1.5;
      height: 340px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      margin-bottom: 0.7rem;
    }

    #sendInput { flex: 1; font-family: "Menlo", "Monaco", "Consolas", monospace; }

    .rx  { color: #7ec87e; }
    .tx  { color: #79aadf; }
    .sys { color: #555; font-style: italic; }
  </style>
</head>
<body>
  <h1>serial2ws</h1>

  <!-- Port name + create/close -->
  <div class="row">
    <label>name</label>
    <input type="text" id="portName" placeholder="myport" />
    <button class="btn-create" id="createBtn">Create Port</button>
    <button class="btn-close"  id="closeBtn"  disabled>Close Port</button>
  </div>

  <!-- Port paths (hidden until created) -->
  <div class="row" id="pathRow" style="display:none">
    <label>tty</label>
    <span class="path-badge" id="ttyPath" title="click to copy"></span>
    <span class="path-badge" id="cuPath"  title="click to copy"></span>
    <span class="copy-hint"  id="copyHint">click to copy</span>
  </div>

  <!-- Status indicators -->
  <div class="status-row">
    <span><span class="dot" id="portDot"></span><span class="status-text" id="portStatus">No port</span></span>
    <span><span class="dot" id="wsDot"></span><span class="status-text" id="wsStatus">Monitor off</span></span>
  </div>

  <!-- Monitor toggle -->
  <div class="row">
    <label>monitor</label>
    <button class="btn-monitor" id="monitorBtn" disabled>Start Monitor</button>
  </div>

  <!-- Terminal -->
  <div id="terminal"></div>

  <!-- Send -->
  <div class="row" style="margin-top:0">
    <input type="text" id="sendInput" placeholder="Send over serial…" disabled style="width:auto;flex:1" />
    <button class="btn-send" id="sendBtn" disabled>Send</button>
  </div>

  <script>
    const terminal   = document.getElementById('terminal');
    const portName   = document.getElementById('portName');
    const createBtn  = document.getElementById('createBtn');
    const closeBtn   = document.getElementById('closeBtn');
    const pathRow    = document.getElementById('pathRow');
    const ttyPathEl  = document.getElementById('ttyPath');
    const cuPathEl   = document.getElementById('cuPath');
    const copyHint   = document.getElementById('copyHint');
    const portDot    = document.getElementById('portDot');
    const portStatus = document.getElementById('portStatus');
    const wsDot      = document.getElementById('wsDot');
    const wsStatus   = document.getElementById('wsStatus');
    const monitorBtn = document.getElementById('monitorBtn');
    const sendInput  = document.getElementById('sendInput');
    const sendBtn    = document.getElementById('sendBtn');

    let ws = null;
    let portActive = false;

    // ── logging ───────────────────────────────────────────────────────────

    function log(text, cls) {
      const span = document.createElement('span');
      span.className = cls;
      span.textContent = text;
      terminal.appendChild(span);
      terminal.scrollTop = terminal.scrollHeight;
    }

    // ── copy-to-clipboard on path badges ─────────────────────────────────

    function copyPath(el) {
      navigator.clipboard.writeText(el.textContent).then(() => {
        copyHint.textContent = 'copied!';
        setTimeout(() => { copyHint.textContent = 'click to copy'; }, 1500);
      });
    }
    ttyPathEl.addEventListener('click', () => copyPath(ttyPathEl));
    cuPathEl.addEventListener('click',  () => copyPath(cuPathEl));

    // ── port state ────────────────────────────────────────────────────────

    function setPortActive(data) {
      portActive = true;
      ttyPathEl.textContent   = data.tty;
      cuPathEl.textContent    = data.cu;
      pathRow.style.display   = '';
      portDot.className       = 'dot on';
      portStatus.textContent  = 'Port active';
      portStatus.className    = 'status-text';
      portName.disabled       = true;
      createBtn.disabled      = true;
      closeBtn.disabled       = false;
      monitorBtn.disabled     = false;
    }

    function setPortInactive() {
      portActive = false;
      pathRow.style.display   = 'none';
      portDot.className       = 'dot';
      portStatus.textContent  = 'No port';
      portStatus.className    = 'status-text';
      portName.disabled       = false;
      createBtn.disabled      = false;
      closeBtn.disabled       = true;
      monitorBtn.disabled     = true;
      monitorBtn.textContent  = 'Start Monitor';
    }

    function setPortError(msg) {
      portDot.className      = 'dot err';
      portStatus.textContent = msg;
      portStatus.className   = 'status-text err';
      createBtn.disabled     = false;
    }

    // ── monitor (WebSocket) state ─────────────────────────────────────────

    function setMonitorOn() {
      wsDot.className        = 'dot on';
      wsStatus.textContent   = 'Monitoring';
      wsStatus.className     = 'status-text';
      monitorBtn.textContent = 'Stop Monitor';
      sendInput.disabled     = false;
      sendBtn.disabled       = false;
    }

    function setMonitorOff() {
      wsDot.className        = 'dot';
      wsStatus.textContent   = 'Monitor off';
      wsStatus.className     = 'status-text';
      monitorBtn.textContent = 'Start Monitor';
      sendInput.disabled     = true;
      sendBtn.disabled       = true;
    }

    // ── WebSocket ─────────────────────────────────────────────────────────

    function startMonitor() {
      ws = new WebSocket(`ws://${location.host}/ws`);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        setMonitorOn();
        log('[monitor started]\n', 'sys');
      };

      ws.onmessage = (e) => {
        log(new TextDecoder().decode(new Uint8Array(e.data)), 'rx');
      };

      ws.onclose = () => {
        ws = null;
        setMonitorOff();
        log('[monitor stopped]\n', 'sys');
      };

      ws.onerror = () => log('[websocket error]\n', 'sys');
    }

    function stopMonitor() {
      if (ws) { ws.close(); ws = null; }
    }

    monitorBtn.addEventListener('click', () => {
      if (ws) stopMonitor(); else startMonitor();
    });

    // ── Create / Close port ───────────────────────────────────────────────

    createBtn.addEventListener('click', async () => {
      const name = portName.value.trim() || 'myport';
      createBtn.disabled = true;
      try {
        const res  = await fetch('/port', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name }),
        });
        const data = await res.json();
        if (res.status === 403) { setPortError(data.detail); return; }
        if (!res.ok) throw new Error(data.detail || 'Failed');
        setPortActive(data);
        log(`[port created: ${data.tty}  ${data.cu}]\n`, 'sys');
      } catch (err) {
        setPortError(err.message);
        log(`[error: ${err.message}]\n`, 'sys');
      }
    });

    closeBtn.addEventListener('click', async () => {
      stopMonitor();
      try { await fetch('/port', { method: 'DELETE' }); } catch (_) {}
      setPortInactive();
      log('[port closed]\n', 'sys');
    });

    // ── Send ──────────────────────────────────────────────────────────────

    function sendData() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const text = sendInput.value;
      if (!text) return;
      ws.send(new TextEncoder().encode(text + '\n'));
      log(text + '\n', 'tx');
      sendInput.value = '';
    }

    sendBtn.addEventListener('click', sendData);
    sendInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendData(); });
  </script>
</body>
</html>
